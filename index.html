<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="텃밭생활">
  <title>슬기로운 텃밭 생활</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ea4bdbbdf5c627aba4db0a4b163c9b0d&libraries=services&autoload=false">
  </script>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <header class="app-header">
    <h1 id="header-title">내 텃밭</h1>
  </header>

  <!-- 화면 -->
  <div class="screens-wrapper">
    <div class="screen active" id="screen-my-farm"></div>
    <div class="screen"        id="screen-today"></div>
    <div class="screen"        id="screen-journal"></div>
    <div class="screen"        id="screen-info"></div>
  </div>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <button class="tab-btn active" onclick="switchTab('my-farm')">
      <span class="tab-icon">🌱</span>
      <span class="tab-label">내 텃밭</span>
    </button>
    <button class="tab-btn" onclick="switchTab('today')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">오늘 할 일</span>
    </button>
    <button class="tab-btn" onclick="switchTab('journal')">
      <span class="tab-icon">📓</span>
      <span class="tab-label">작업 일지</span>
    </button>
    <button class="tab-btn" onclick="switchTab('info')">
      <span class="tab-icon">🔗</span>
      <span class="tab-label">정보 연결</span>
    </button>
  </nav>

</div>

<script src="js/data.js"></script>
<script src="js/screens.js"></script>
<script src="js/app.js"></script>
</body>
</html>
