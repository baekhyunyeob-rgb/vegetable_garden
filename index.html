<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="텃밭생활">
  <title>슬기로운 텃밭 생활</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=31567e918e3f2a0bf56cc90e5da2f0b8&libraries=services&autoload=false"></script>
</head>
<body>
<div id="app">

  <!-- ── 헤더 ── -->
  <header class="app-header" id="app-header">
    <h1 id="header-title">내 텃밭 등록</h1>
    <span class="header-sub" id="header-sub"></span>
  </header>

  <!-- ── 화면 래퍼 ── -->
  <div class="screens-wrapper">
    <!-- ── 화면 1: 내 텃밭 ── -->
    <div class="screen active" id="screen-my-farm"></div>

    <!-- ── 화면 2: 오늘의 정보 ── -->
    <div class="screen" id="screen-today"></div>

    <!-- ── 화면 3: 농작업 ── -->
    <div class="screen" id="screen-work"></div>

    <!-- ── 화면 4: AI 추천 ── -->
    <div class="screen" id="screen-ai"></div>
  </div>

  <!-- ── 하단 탭바 ── -->
  <nav class="tabbar">
    <button class="tab-btn active" onclick="switchTab('my-farm')">
      <span class="tab-icon">🌱</span>
      <span class="tab-label">내 텃밭</span>
    </button>
    <button class="tab-btn" onclick="switchTab('today')">
      <span class="tab-icon">🌤</span>
      <span class="tab-label">오늘의 정보</span>
    </button>
    <button class="tab-btn" onclick="switchTab('work')">
      <span class="tab-icon">📅</span>
      <span class="tab-label">농작업</span>
    </button>
    <button class="tab-btn" onclick="switchTab('ai')">
      <span class="tab-icon">🤖</span>
      <span class="tab-label">AI 추천</span>
    </button>
  </nav>

</div>

<script src="js/data.js"></script>
<script src="js/screens.js"></script>
<script src="js/app.js"></script>
</body>
</html>
